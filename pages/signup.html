<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Wolex</title>
    <link rel="stylesheet" href="../styles/auth.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-left">
        <div class="brand">
          <img
            src="../assets/logo_dark.jpeg"
            alt="Wolex Logo"
            class="logo-icon"
          >
          <h1>Join Wolex</h1>
          <p>Your calm companion for smarter financial living.</p>
          <img
            src="../assets/img3.jpeg"
            alt="Dashboard preview"
            class="float-img float-img-1"
          >
          <img
            src="../assets/img2.jpeg"
            alt="Analytics preview"
            class="float-img float-img-2"
          >
        </div>

        <div class="auth-highlights">
          <span>Secure</span>
          <span>Private</span>
          <span>Simple Budgeting</span>
        </div>
      </section>

      <section class="auth-right">
        <div class="auth-card">
          <h2>Create your account</h2>
          <p>Start tracking your money with more clarity and less stress.</p>

          <form class="auth-form" id="signup-form">
            <label for="firstname">First Name</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              placeholder="Enter your first name"
            >

            <label for="lastname">Last Name</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              placeholder="Enter your last name"
            >

            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
            >

            <label for="nationality">Nationality</label>
            <input
              type="text"
              list="country-list"
              id="nationality"
              name="nationality"
              placeholder="Search for your country"
              required
            >

            <datalist id="country-list">
              <option value="">Select your country</option>
              <option selected>Nigeria</option>
              <option>South Africa</option>
              <option>United States</option>
              <option>Mexico</option>
              <option>United Kingdom</option>
              <option>Canada</option>
              <option>India</option>
              <option>Italy</option>
              <option>China</option>
              <option>Germany</option>
              <option>France</option>
              <option>Japan</option>
              <option>Ghana</option>
              <option>Egypt</option>
              <option>Brazil</option>
              <option>Australa</option>
              <option>Argentina</option>
              <option>Peru</option>
              <option>New Zealand</option>
              <option>Nepal</option>
            </datalist>

            <label for="currency">Preferred Currency</label>
            <input
              type="text"
              list="currency-list"
              id="currency"
              name="currency"
              placeholder="Search for your currency"
              required
            >

            <datalist id="currency-list">
              <option value="">Select currency</option>
              <option value="NGN">NGN — Nigerian Naira</option>
              <option value="ZAR">ZAR - South African Rand</option>
              <option value="USD">USD — US Dollar</option>
              <option value="MXN">MXN - Mexican Peso</option>
              <option value="EUR">EUR — Euro</option>
              <option value="JPY">JPY - Japanese Yen</option>
              <option value="GBP">GBP — British Pound</option>
              <option value="CAD">CAD — Canadian Dollar</option>
              <option value="AUD">AUD — Australian Dollar</option>
              <option value="GHS">GHS - Ghanian Cedi</option>
              <option value="EGP">EGP - Egyptian Pound</option>
              <option value="INR">INR — Indian Rupee</option>
              <option value="CNY">CNY - Chinese Yuan Renminbi</option>
              <option value="BRL">BRL - Brazilian Real</option>
              <option value="ARS">ARS - Argentine Peso</option>
              <option value="PEN">PEN - Peruvian Sol</option>
              <option value="NZD">NZD - New Zealand Dollar</option>
              <option value="NPR">NPR - Nepalese Rupee</option>
            </datalist>

            <label>Account Type</label>

            <div class="account-types">
              <label>
                <input type="radio" name="accountType" value="Individual">
                Individual
              </label>

              <label>
                <input type="radio" name="accountType" value="Business">
                Business
              </label>

              <label>
                <input type="radio" name="accountType" value="Family">
                Family
              </label>
            </div>

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              minlength="8"
              pattern="^(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}$"
              title="Password must be at least 8 characters long and include at least 1 number and 1 symbol."
              required
              autocomplete="new-password"
            >

            <small class="input-hint">
              Must be at least 8 characters and include 1 number and 1 symbol.
            </small>

            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Confirm your password"
              required
              autocomplete="new-password"
            >
            <p id="password-error"></p>
            <p id="signup-error"></p>

            <button type="submit" class="btn btn-primary">
              Create Account
            </button>

            <!-- <button type="button" class="google-btn">
              <img src="../assets/google-icon.jpeg" alt="Google icon">
              Continue with Google
            </button> -->
<!-- 
            <div class="divider">
              <span>or</span>
            </div>
          </form> -->
          </form>

          <p class="auth-switch">
            Already have an account?
            <a href="login.html">Log in</a>
          </p>
          </div>
          </section>
        </main>
    <script src="../scripts/signup.js"></script>
  </body>
</html>

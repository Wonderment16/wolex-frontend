<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Wolex</title>
    <link rel="stylesheet" href="../styles/auth.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-left">
        <div class="brand">
          <img
            src="../assets/logo_dark.jpeg"
            alt="Wolex Logo"
            class="logo-icon"
          >
          <h1>Reset your password</h1>
          <p>We’ll help you get back into your account.</p>
        </div>

        <div class="auth-highlights">
          <span>Secure</span>
          <span>Simple</span>
          <span>Fast Recovery</span>
        </div>
      </section>

      <section class="auth-right">
        <div class="auth-card">
          <h2>Forgot your password?</h2>
          <p>Enter your email and we’ll send you a reset link or OTP.</p>

          <form id="forgot-form" class="auth-form">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
              autocomplete="email"
            >

            <button type="submit" class="btn btn-primary">
              Send Reset Link
            </button>

            <p id="forgot-message"></p>
          </form>

          <p class="auth-switch">
            Remembered your password?
            <a href="login.html">Log in</a>
          </p>
        </div>
      </section>
    </main>
    <script src="../scripts/forgot_password.js"></script>
  </body>
</html>

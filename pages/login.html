<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wolex</title>
    <link rel="stylesheet" href="../styles/auth.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-left">
        <div class="brand">
          <img
            src="../assets/logo_dark.jpeg"
            alt="Wolex Logo"
            class="logo-icon"
          >
          <h1>Welcome back</h1>
          <p>Log in to continue your calm financial journey with Wolex.</p>
          <img
            src="../assets/img3.jpeg"
            alt="Dashboard preview"
            class="float-img float-img-1"
          >
          <img
            src="../assets/img2.jpeg"
            alt="Analytics preview"
            class="float-img float-img-2"
          >
        </div>

        <div class="auth-highlights">
          <span>Secure</span>
          <span>Private</span>
          <span>Fast Access</span>
        </div>
      </section>

      <section class="auth-right">
        <div class="auth-card">
          <h2>Log in to your account</h2>
          <p>Pick up right where you left off.</p>

          <form class="auth-form" id="login-form" method="POST">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
              autocomplete="email"
            >

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >

            <a href="forgot_password.html" class="forgot-link"
              >Forgot password?</a
            >
            <button type="submit" class="btn btn-primary">
              Login
            </button>


            <p id="login-error" class="form-error"></p>

            <!-- <button type="button" class="google-btn">
              <img src="../assets/google-icon.jpeg" alt="Google icon">
              Continue with Google
            </button> -->

            <!-- <div class="divider">
              <span>or</span>
            </div>
``        </form> -->
          </form>

          <p class="auth-switch">
            Don’t have an account?
            <a href="signup.html">Sign up</a>
          </p>
        </div>
      </section>
    </main>
    <script src="../scripts/login.js"></script>
  </body>
</html>
